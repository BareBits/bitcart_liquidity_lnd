[pytest]
# Pick up the project's existing `*_tests.py` naming alongside pytest's
# default `test_*.py`, so `pytest tests/` discovers both code_only_tests.py
# and network_tests.py automatically.
python_files = test_*.py *_tests.py
testpaths = tests

# Safety net: hard 60-second kill per test. Added after a tick-loop test
# with a fast-mocked main() became a CPU-tight infinite loop that
# starved the asyncio scheduler, never yielded to its own internal
# timeout, and OOM-thrashed the host. The `signal` method actually
# kills a wedged process — the default `thread` method can't break a
# stuck event loop. Network tests that legitimately need longer (loop
# daemon setup, regtest mining, etc.) override with @pytest.mark.timeout(N).
timeout = 60
timeout_method = signal
